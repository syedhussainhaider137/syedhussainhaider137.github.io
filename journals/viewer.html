<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Opening essay…</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>⚛️</text></svg>">
<script>
  (function(){
    try{
      var t = localStorage.getItem('theme');
      if(!t && window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
      if(t === 'dark') document.documentElement.classList.add('dark');
    }catch(e){}
  })();
</script>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --text:#191c2e; --muted:#5b6175;
    --border:#e4e7f0; --accent:#5457d6; --accent-2:#9a4ee0;
    --accent-soft:rgba(84,87,214,.08); --accent-border:rgba(84,87,214,.28);
    --ring:rgba(84,87,214,.45);
    --glow-1:rgba(84,87,214,.12); --glow-2:rgba(154,78,224,.09);
    --shadow:0 1px 2px rgba(25,28,46,.04), 0 8px 24px rgba(25,28,46,.07);
  }
  html.dark{
    --bg:#0a0e1c; --card:#10162b; --text:#e9ecf8; --muted:#9ba4c0;
    --border:#232c49; --accent:#8b8df5; --accent-2:#c184fa;
    --accent-soft:rgba(139,141,245,.10); --accent-border:rgba(139,141,245,.32);
    --ring:rgba(139,141,245,.5);
    --glow-1:rgba(139,141,245,.16); --glow-2:rgba(193,132,250,.10);
    --shadow:0 1px 2px rgba(0,0,0,.35), 0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html{background:var(--bg)}
  body{
    margin:0; min-height:100vh; min-height:100dvh; display:grid; place-items:center;
    padding:1.5rem; color:var(--text);
    font:400 16px/1.6 Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(46rem 28rem at 80% -10%, var(--glow-1), transparent 62%),
      radial-gradient(42rem 26rem at -10% 90%, var(--glow-2), transparent 62%);
  }
  .card{width:min(480px,100%); background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:1.6rem 1.6rem 1.4rem; box-shadow:var(--shadow); text-align:center}
  .spinner{width:34px; height:34px; margin:0 auto .9rem; border-radius:50%;
    border:3px solid var(--accent-soft); border-top-color:var(--accent);
    animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{margin:0 0 .35rem; font-size:1.06rem; font-weight:600; letter-spacing:-.01em; overflow-wrap:anywhere}
  p{margin:0 0 1.1rem; color:var(--muted); font-size:.93rem}
  .row{display:flex; gap:.55rem; justify-content:center; flex-wrap:wrap}
  a.btn{display:inline-flex; align-items:center; gap:.4rem; padding:.55rem 1rem; border-radius:10px;
    font-weight:600; font-size:.9rem; text-decoration:none;
    border:1px solid var(--border); color:var(--text); transition:border-color .2s, color .2s}
  a.btn:hover{border-color:var(--accent-border); color:var(--accent)}
  a.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  a.btn.primary:hover{background:var(--accent-2); border-color:var(--accent-2); color:#fff}
  a.back{display:inline-block; margin-top:1.1rem; color:var(--muted); font-size:.88rem;
    font-weight:500; text-decoration:none}
  a.back:hover{color:var(--accent)}
  :is(a):focus-visible{outline:2px solid var(--ring); outline-offset:2px; border-radius:8px}
  @media (prefers-reduced-motion:reduce){ .spinner{animation:none} }
</style>
</head>
<body>
<noscript>
  <div class="card">
    <h1>JavaScript required</h1>
    <p>This page opens the essay PDF automatically. Please enable JavaScript, or browse the PDFs directly in the <code>journals/</code> folder.</p>
    <a class="back" href="../journal.html">← All essays</a>
  </div>
</noscript>

<div class="card" id="ui" hidden>
  <div class="spinner" id="spin" aria-hidden="true"></div>
  <h1 id="title">Opening essay…</h1>
  <p id="msg">If nothing happens, use one of the buttons below.</p>
  <div class="row" id="row">
    <a id="openBtn" class="btn primary" rel="noopener">Open PDF</a>
    <a id="dlBtn" class="btn" download>Download</a>
  </div>
  <a class="back" href="../journal.html">← All essays</a>
</div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var humanTitle = params.get('title') || 'Essay';
  var pdf = (params.get('pdf') || '').trim().replace(/^\.\//, '');

  document.title = humanTitle + ' – Syed Hussain Haider';

  if (!pdf) { showUI('No PDF specified', null, 'This link is missing its document. Head back to the essay list.'); return; }

  var resolved;
  try { resolved = new URL(pdf, location.href); }
  catch (e) { showUI('Invalid PDF link', null, 'This link looks malformed. Head back to the essay list.'); return; }

  /* Safety: only same-origin files */
  if (resolved.origin !== location.origin) {
    showUI('Blocked external link', null, 'For safety, only PDFs hosted on this site can be opened here.');
    return;
  }

  showUI(humanTitle, resolved.href, 'Opening the PDF… if nothing happens, use one of the buttons below.');

  /* Navigate straight to the PDF — location.replace keeps Back-button behaviour clean */
  try { location.replace(resolved.href); } catch (e) {}

  function showUI(titleText, href, msgText) {
    var ui = document.getElementById('ui');
    document.getElementById('title').textContent = titleText;
    document.getElementById('msg').textContent = msgText;
    if (href) {
      document.getElementById('openBtn').href = href;
      document.getElementById('dlBtn').href = href;
    } else {
      document.getElementById('row').style.display = 'none';
      document.getElementById('spin').style.display = 'none';
    }
    ui.hidden = false;
  }
})();
</script>
</body>
</html>
